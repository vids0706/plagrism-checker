<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard - CopyShield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="dashboard-page">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">CopyShield - Student Panel</span>
    <a href="/login.html" class="btn btn-outline-light btn-sm">Logout</a>
</nav>

<div class="container mt-4">
    <h3>Student Dashboard</h3>

    <div class="mb-3">
        <a href="/upload.html" class="btn btn-primary">Upload Assignment</a>
    </div>

    <div class="card p-3 shadow mt-4">
        <h5>Your Submissions</h5>

        <table class="table mt-3">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Title</th>
                    <th>Plagiarism %</th>
                    <th>Marks</th>
                    <th>Feedback</th>
                </tr>
            </thead>
            <tbody id="studentTable">
            </tbody>
        </table>
    </div>
</div>

<script>
async function loadStudentData() {

    const userId = localStorage.getItem("userId");

    if (!userId) {
        window.location.href = "/login.html";
        return;
    }

    const response = await fetch(`/api/submissions/student/${userId}`);
    const data = await response.json();

    const table = document.getElementById("studentTable");
    table.innerHTML = "";

    data.forEach(sub => {

        let color = "green";
        if (sub.plagiarism_score > 70) color = "red";
        else if (sub.plagiarism_score > 40) color = "orange";

        table.innerHTML += `
            <tr>
                <td>${sub.subject}</td>
                <td>${sub.title}</td>
                <td style="color:${color}; font-weight:bold;">
                    ${sub.plagiarism_score}%
                </td>
                <td>${sub.marks ?? "-"}</td>
                <td>${sub.feedback ?? "-"}</td>
            </tr>
        `;
    });
}

loadStudentData();
</script>

</body>
</html>
