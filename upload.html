<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Assignment - CopyShield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: #eef2f7;
        }
        .upload-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-top: 80px;
        }
    </style>
</head>

<body class="dashboard-page">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">CopyShield - Upload Assignment</span>
    <a href="/student_dashboard.html" class="btn btn-outline-light btn-sm">Back</a>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="upload-box shadow">
                <h4 class="text-center mb-3">Submit Assignment</h4>

                <form id="uploadForm" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label>Subject</label>
                        <select class="form-control" name="subject" required>
                            <option value="DBMS">DBMS</option>
                            <option value="Operating Systems">Operating Systems</option>
                            <option value="Data Structures">Data Structures</option>
                            <option value="Web Development">Web Development</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Assignment Title</label>
                        <input type="text" class="form-control" name="title" placeholder="Enter assignment title" required>
                    </div>

                    <div class="mb-3">
                        <label>Upload File (.txt only)</label>
                        <input type="file" class="form-control" name="assignmentFile" accept=".txt" required>
                    </div>

                    <button type="submit" class="btn btn-success w-100">Submit</button>

                </form>

                <p class="text-center mt-3">
                    <a href="/student_dashboard.html">← Back to Dashboard</a>
                </p>

            </div>
        </div>
    </div>
</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const userId = localStorage.getItem("userId");

    if (!userId) {
        alert("You are not logged in.");
        window.location.href = "/login.html";
        return;
    }

    const formData = new FormData(this);
    formData.append("userId", userId);

    try {
        const response = await fetch("/api/submissions/submit", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (!response.ok) {
            alert(data.error);
            return;
        }

        alert("Assignment submitted successfully!");
        window.location.href = "/student_dashboard.html";

    } catch (error) {
        alert("Upload failed. Please try again.");
    }
});
</script>

</body>
</html>
