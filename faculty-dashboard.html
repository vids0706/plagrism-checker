<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faculty Dashboard - CopyShield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="dashboard-page">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">CopyShield - Faculty Panel</span>
    <a href="/login.html" class="btn btn-outline-light btn-sm">Logout</a>
</nav>

<div class="container mt-4">

    <h3>Faculty Dashboard</h3>

    <!-- Subject Filter Buttons -->
    <div class="mb-3">
        <button class="btn btn-secondary btn-sm" onclick="loadSubmissions()">All</button>
        <button class="btn btn-secondary btn-sm" onclick="loadSubmissions('DBMS')">DBMS</button>
        <button class="btn btn-secondary btn-sm" onclick="loadSubmissions('Data Structures')">DSA</button>
        <button class="btn btn-secondary btn-sm" onclick="loadSubmissions('Operating Systems')">OS</button>
        <button class="btn btn-secondary btn-sm" onclick="loadSubmissions('Web Development')">Web</button>
    </div>

    <div class="card p-3 shadow mt-4">
        <h5>Submitted Assignments</h5>

        <table class="table mt-3">
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Subject</th>
                    <th>Title</th>
                    <th>Plagiarism %</th>
                    <th>Marks</th>
                    <th>Feedback</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="submissionTable">
                <tr>
                    <td colspan="7" class="text-center text-muted">
                        Click "All" or select a subject to view submissions.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>

async function loadSubmissions(subject = "") {

    let url = "/api/submissions/all";

    if (subject) {
        url += `?subject=${encodeURIComponent(subject)}`;
    }

    const response = await fetch(url);
    const data = await response.json();

    const table = document.getElementById("submissionTable");
    table.innerHTML = "";

    if (data.length === 0) {
        table.innerHTML = `
            <tr>
                <td colspan="7" class="text-center text-muted">
                    No submissions found for this subject.
                </td>
            </tr>
        `;
        return;
    }

    data.forEach(sub => {

        let color = "green";
        if (sub.plagiarism_score > 70) color = "red";
        else if (sub.plagiarism_score > 40) color = "orange";

        table.innerHTML += `
            <tr id="row-${sub.id}">
                <td>${sub.name}</td>
                <td>${sub.subject}</td>
                <td>${sub.title}</td>
                <td style="color:${color}; font-weight:bold;">
                    ${sub.plagiarism_score}%
                </td>

                <td id="marks-display-${sub.id}">
                    ${sub.marks ?? "-"}
                </td>

                <td id="feedback-display-${sub.id}">
                    ${sub.feedback ?? "-"}
                </td>

                <td>
                    <button class="btn btn-warning btn-sm"
                        onclick="enableEdit(${sub.id}, '${sub.marks ?? ""}', '${sub.feedback ?? ""}')">
                        Edit
                    </button>
                </td>
            </tr>
        `;
    });
}

function enableEdit(id, currentMarks, currentFeedback) {

    document.getElementById(`marks-display-${id}`).innerHTML = `
        <input type="number" id="marks-${id}" 
            class="form-control" style="width:80px;" 
            value="${currentMarks}">
    `;

    document.getElementById(`feedback-display-${id}`).innerHTML = `
        <input type="text" id="feedback-${id}" 
            class="form-control" 
            value="${currentFeedback}">
    `;

    const actionCell = document.querySelector(`#row-${id} td:last-child`);
    actionCell.innerHTML = `
        <button class="btn btn-success btn-sm"
            onclick="saveEdit(${id})">
            Save
        </button>
    `;
}

async function saveEdit(id) {

    const marks = document.getElementById(`marks-${id}`).value;
    const feedback = document.getElementById(`feedback-${id}`).value;

    const response = await fetch("/api/submissions/grade", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            submissionId: id,
            marks: marks,
            feedback: feedback
        })
    });

    if (response.ok) {
        loadSubmissions(); // Reload in view mode
    } else {
        alert("Error saving");
    }
}

</script>

</body>
</html>
